<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Teacher Login – The Gurukul High</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/font-awesome.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:#f0f2f8;min-height:100vh;display:flex;flex-direction:column;}
:root{--navy:#0D1B5E;--green:#C9A227;--green-l:#E6C86A;}

.top-bar{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:12px;}
.top-bar img{width:38px;height:38px;border-radius:8px;}
.top-bar .school-name{color:#fff;font-size:15px;font-weight:700;}
.top-bar .school-sub{color:rgba(255,255,255,0.45);font-size:11px;text-transform:uppercase;letter-spacing:1px;}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px;}

.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(13,27,94,0.12);width:100%;max-width:420px;overflow:hidden;}
.card-header{background:linear-gradient(135deg,var(--navy) 0%,#1a2f8a 100%);padding:32px 32px 28px;text-align:center;}
.teacher-icon{width:64px;height:64px;background:rgba(255,255,255,0.12);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#fff;}
.card-header h1{color:#fff;font-size:22px;font-weight:800;margin-bottom:4px;}
.card-header p{color:rgba(255,255,255,0.55);font-size:13px;}

.card-body{padding:28px 32px 32px;}

.field{margin-bottom:18px;}
.field label{display:block;font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px;}
.field input{width:100%;border:1.5px solid #e5e7ef;border-radius:10px;padding:12px 14px 12px 40px;font-family:'Poppins',sans-serif;font-size:14px;color:#333;outline:none;transition:border .2s,box-shadow .2s;}
.field input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,27,94,0.08);}

.login-btn{width:100%;background:linear-gradient(135deg,var(--green) 0%,#A67C00 100%);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.login-btn:hover{opacity:0.93;transform:translateY(-1px);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.error-msg{background:rgba(220,53,69,0.08);border:1px solid rgba(220,53,69,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#dc3545;margin-bottom:16px;display:none;}
.error-msg.show{display:block;}

.links{display:flex;justify-content:space-between;margin-top:20px;padding-top:18px;border-top:1px solid #f0f0f0;}
.links a{font-size:12px;color:#aaa;text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .2s;}
.links a:hover{color:var(--navy);}

.demo-box{background:#f8f9fc;border:1.5px dashed #d0d5e8;border-radius:10px;padding:12px 16px;margin-bottom:18px;}
.demo-box p{font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.demo-box button{background:none;border:1.5px solid var(--green);color:var(--green);border-radius:6px;padding:5px 12px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.demo-box button:hover{background:var(--green);color:#fff;}
.demo-creds{font-size:12px;color:#555;line-height:1.8;margin-top:6px;}
.demo-creds span{font-family:monospace;background:#eef0f7;padding:2px 6px;border-radius:4px;}

@media(max-width:768px){
  .top-bar{padding:12px 16px;}
  .top-bar img{width:34px;height:34px;}
  .top-bar .school-name{font-size:14px;}
  .top-bar .school-sub{font-size:10px;}
  .page{padding:24px 12px;}
  .card{max-width:95%;}
  .card-header{padding:26px 24px 22px;}
  .teacher-icon{width:56px;height:56px;font-size:24px;}
  .card-header h1{font-size:20px;}
  .card-header p{font-size:12px;}
  .card-body{padding:24px 24px 28px;}
  .field{margin-bottom:16px;}
  .field label{font-size:11px;}
  .field input{font-size:13px;padding:11px 12px 11px 38px;}
  .login-btn{padding:12px;font-size:14px;}
  .demo-box{padding:10px 14px;margin-bottom:14px;}
  .demo-box p{font-size:10px;}
  .demo-creds{font-size:11px;}
  .links{margin-top:16px;padding-top:14px;gap:8px;}
  .links a{font-size:11px;}
}

@media(max-width:480px){
  .top-bar{padding:10px 12px;}
  .top-bar img{width:32px;height:32px;}
  .top-bar .school-name{font-size:13px;}
  .top-bar .school-sub{font-size:9px;}
  .page{padding:20px 10px;}
  .card{max-width:100%;}
  .card-body{padding:20px 18px 24px;}
  .card-header{padding:22px 18px 18px;}
  .teacher-icon{width:48px;height:48px;font-size:22px;margin-bottom:12px;}
  .card-header h1{font-size:18px;margin-bottom:2px;}
  .card-header p{font-size:11px;}
  .field{margin-bottom:14px;}
  .field label{font-size:10px;margin-bottom:5px;}
  .input-wrap i{font-size:13px;}
  .field input{font-size:12px;padding:10px 12px 10px 36px;}
  .login-btn{padding:11px;font-size:13px;}
  .error-msg{font-size:12px;padding:8px 12px;margin-bottom:12px;}
  .demo-box{padding:10px 12px;margin-bottom:14px;}
  .demo-box p{font-size:10px;}
  .demo-creds{font-size:11px;line-height:1.6;}
  .demo-box button{font-size:10px;padding:4px 10px;}
  .links{flex-direction:column;gap:8px;margin-top:14px;padding-top:12px;}
  .links a{font-size:11px;justify-content:center;}
}

@media(max-width:375px){
  .top-bar{padding:8px 10px;}
  .top-bar img{width:30px;height:30px;}
  .top-bar .school-name{font-size:12px;}
  .card-header{padding:20px 16px 16px;}
  .teacher-icon{width:44px;height:44px;font-size:20px;}
  .card-header h1{font-size:16px;}
  .card-header p{font-size:10px;}
  .card-body{padding:18px 16px 22px;}
  .field{margin-bottom:12px;}
  .field label{font-size:9px;}
  .field input{font-size:11px;padding:9px 10px 9px 34px;}
  .login-btn{padding:10px;font-size:12px;}
  .demo-box{padding:8px 10px;margin-bottom:12px;}
  .demo-box p{font-size:9px;}
}
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C9A227">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gurukul ERP">
</head>
<body>

<div class="top-bar">
  <img src="/images/gurukul-logo.png" alt="Gurukul">
  <div>
    <div class="school-name">The Gurukul High</div>
    <div class="school-sub">K.R. Nagar, Mysuru</div>
  </div>
</div>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="teacher-icon"><i class="fa fa-chalkboard-teacher" style="font-size:26px;">&#xf0c0;</i></div>
      <h1>Teacher Portal</h1>
      <p>Sign in to mark attendance &amp; manage your classes</p>
    </div>
    <div class="card-body">

      <!-- Demo credentials -->
      <div class="demo-box">
        <p>&#128075; Demo Credentials</p>
        <div class="demo-creds">
          Username: <span>suresh.kumar</span> &nbsp; Password: <span>Teacher@123</span>
        </div>
        <button onclick="autofill()" style="margin-top:8px;">Auto-fill Demo</button>
      </div>

      <div class="error-msg" id="errMsg"></div>

      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa fa-user"></i>
          <input type="text" id="username" placeholder="e.g. suresh.kumar" autocomplete="username">
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        <i class="fa fa-sign-in"></i> Sign In
      </button>

      <div class="links">
        <a href="/portal/login.html"><i class="fa fa-arrow-left"></i> Student Login</a>
        <a href="/index.html"><i class="fa fa-home"></i> School Website</a>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api';

function autofill() {
  document.getElementById('username').value = 'suresh.kumar';
  document.getElementById('password').value = 'Teacher@123';
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('errMsg').classList.remove('show'); }

async function doLogin() {
  hideError();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return showError('Please enter username and password.');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing in…';

  try {
    const res  = await fetch(`${API}/teacher/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Login failed. Please try again.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa fa-sign-in"></i> Sign In';
      return;
    }

    sessionStorage.setItem('teacherToken',  data.token);
    sessionStorage.setItem('teacherInfo',   JSON.stringify(data.teacher));
    window.location.href = '/portal/teacher-dashboard.html';

  } catch(e) {
    showError('Cannot connect to server. Make sure the server is running.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-sign-in"></i> Sign In';
  }
}

// Redirect if already logged in
if (sessionStorage.getItem('teacherToken')) {
  window.location.href = '/portal/teacher-dashboard.html';
}
</script>
</body>
</html>
